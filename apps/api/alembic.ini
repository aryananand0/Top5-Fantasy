[alembic]
# Location of the migration scripts directory
script_location = alembic

# Python path prepend — ensures imports from apps/api/ root work in env.py
prepend_sys_path = .

# sqlalchemy.url is intentionally left unset here.
# It is loaded from environment variables in alembic/env.py via pydantic-settings.
# sqlalchemy.url =

# Version file naming: timestamp prefix keeps files orderable
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for file timestamps
timezone = UTC


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
